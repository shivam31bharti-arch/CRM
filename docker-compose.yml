# Local development stack for app, PostgreSQL, and Redis.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      # [M-7] Bind to loopback only — prevents exposing DB port to the public internet.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # [M-7] Bind Redis to loopback only as well.
      - "127.0.0.1:6379:6379"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm?schema=public
      NEXTAUTH_URL: http://localhost:3000
      # IMPORTANT: Override these in production with real secrets.
      # Generate with: openssl rand -base64 32
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-development-secret-change-me-in-production}
      AUTH_SECRET: ${AUTH_SECRET:-local-development-secret-change-me-in-production}
      # Generate with: openssl rand -hex 32
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # Generate with: openssl rand -base64 32
      API_KEY_SECRET: ${API_KEY_SECRET:-}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

volumes:
  postgres-data:
